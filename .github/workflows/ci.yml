name: CI Pipeline

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'

      - run: npm ci

      - name: Make setup
        run: make setup

      - name: Make lint
        run: make lint

      - name: Make test
        run: make test

      - name: Hello from Hexlet!
        uses: hexlet-components/hello-from-hexlet-action@release